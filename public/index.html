<!DOCTYPE html>
<html>
<head>
  <title>Inventario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h2 class="text-center">📦 Inventario de Productos</h2>

  <!-- FORMULARIO -->
  <div class="card p-3 mt-3">
    <input id="nombre" class="form-control mb-2" placeholder="Nombre">

    <input id="precio" type="number" step="0.01" class="form-control mb-2" placeholder="Precio">

    <input id="stock" type="number" class="form-control mb-2" placeholder="Stock">

    <button class="btn btn-primary" onclick="guardar()">Agregar</button>
  </div>

  <!-- LISTA -->
  <table class="table table-bordered mt-4">
    <thead>
      <tr>
        <th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

<script>
const API = "http://localhost:3000/api/productos";

// LISTAR
function listar(){
  fetch(API)
    .then(res => res.json())
    .then(data => {
      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach(p => {
        tabla.innerHTML += `
          <tr>
            <td>${p.id}</td>
            <td>${p.nombre}</td>
            <td>${p.precio}</td>
            <td>${p.stock}</td>
            <td>
              <button onclick="eliminar(${p.id})" class="btn btn-danger btn-sm">Eliminar</button>
            </td>
          </tr>
        `;
      });
    });
}

// AGREGAR (ARREGLADO)
function guardar(){

  if(!nombre.value || !precio.value || !stock.value){
    alert("⚠️ Completa todos los campos");
    return;
  }

  fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      nombre: nombre.value,
      precio: parseFloat(precio.value),
      stock: parseInt(stock.value)
    })
  })
  .then(() => {
    listar();
    nombre.value = "";
    precio.value = "";
    stock.value = "";
  });
}

// ELIMINAR
function eliminar(id){
  fetch(API + "/" + id, { method: "DELETE" })
    .then(() => listar());
}

listar();
</script>

</body>
</html>
