<!DOCTYPE html>
<html>
<head>
  <title>Inventario Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    body{background:#f4f6f9;}
    .card{border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.1);}
    th{background:#4e73df;color:white;text-align:center;}
    td{text-align:center;vertical-align:middle;}
    video{width:100%; border-radius:10px;}
    img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
  </style>
</head>

<body class="container mt-4">

<h2 class="text-center">📦 Inventario Pro</h2>

<!-- BUSCAR -->
<input id="buscar" class="form-control mb-3" placeholder="🔍 Buscar..." onkeyup="listar()">

<!-- EXPORTAR -->
<div class="text-end mb-2">
  <button class="btn btn-success" onclick="exportExcel()">Excel</button>
  <button class="btn btn-danger" onclick="exportPDF()">PDF</button>
</div>

<!-- FORM -->
<div class="card p-3">

  <input id="nombre" class="form-control mb-2" placeholder="Nombre">
  <input id="precio" type="number" class="form-control mb-2" placeholder="Precio">
  <input id="stock" type="number" class="form-control mb-2" placeholder="Stock">

  <!-- CAMARA -->
  <button class="btn btn-dark mb-2" onclick="toggleCamara()">📷 Encender Cámara</button>
  <video id="video" autoplay style="display:none;"></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <button class="btn btn-primary mt-2" onclick="capturar()">Tomar Foto</button>

  <img id="preview" class="mt-2" />

  <button class="btn btn-success mt-3" onclick="guardar()">Agregar</button>
  <button class="btn btn-warning mt-3" id="btnUpdate" style="display:none;" onclick="actualizar()">Actualizar</button>
</div>

<!-- TABLA -->
<table class="table table-bordered mt-4">
  <thead>
    <tr>
      <th>ID</th>
      <th>Imagen</th>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>

let API = "http://localhost:3000/api/productos";
let editId = null;
let imagenBase64 = "";
let camaraActiva = false;
let stream = null;

/* ================= CAMARA ================= */
function toggleCamara(){
  let video = document.getElementById("video");

  if(!camaraActiva){
    navigator.mediaDevices.getUserMedia({video:true})
    .then(s=>{
      stream = s;
      video.srcObject = s;
      video.style.display = "block";
      camaraActiva = true;
    });
  } else {
    stream.getTracks().forEach(t=>t.stop());
    video.style.display = "none";
    camaraActiva = false;
  }
}

/* ================= FOTO ================= */
function capturar(){
  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  imagenBase64 = canvas.toDataURL("image/png");
  document.getElementById("preview").src = imagenBase64;
}

/* ================= LISTAR ================= */
function listar(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    let filtro = document.getElementById("buscar").value.toLowerCase();
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    data
    .filter(p=>p.nombre.toLowerCase().includes(filtro))
    .forEach(p=>{
      tabla.innerHTML += `
        <tr>
          <td>${p.id}</td>
          <td>${p.imagen ? `<img src="${p.imagen}">` : "No img"}</td>
          <td>${p.nombre}</td>
          <td>${p.precio}</td>
          <td>${p.stock}</td>
          <td>
            <button class="btn btn-warning btn-sm"
              onclick="editar(${p.id},'${p.nombre}',${p.precio},${p.stock},'${p.imagen}')">Editar</button>

            <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
          </td>
        </tr>
      `;
    });
  });
}

/* ================= GUARDAR ================= */
function guardar(){

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:nombre.value,
      precio:parseFloat(precio.value),
      stock:parseInt(stock.value),
      imagen:imagenBase64
    })
  }).then(()=>{
    limpiar();
    listar();
  });
}

/* ================= EDITAR ================= */
function editar(id,n,p,s,img){
  editId = id;

  nombre.value = n;
  precio.value = p;
  stock.value = s;
  imagenBase64 = img;

  document.getElementById("preview").src = img;

  document.getElementById("btnUpdate").style.display = "block";
}

/* ================= ACTUALIZAR ================= */
function actualizar(){
  fetch(API+"/"+editId,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:nombre.value,
      precio:parseFloat(precio.value),
      stock:parseInt(stock.value),
      imagen:imagenBase64
    })
  }).then(()=>{
    limpiar();
    listar();
    document.getElementById("btnUpdate").style.display="none";
  });
}

/* ================= ELIMINAR ================= */
function eliminar(id){
  fetch(API+"/"+id,{method:"DELETE"})
  .then(()=>listar());
}

/* ================= LIMPIAR ================= */
function limpiar(){
  nombre.value="";
  precio.value="";
  stock.value="";
  imagenBase64="";
  document.getElementById("preview").src="";
}

/* ================= EXPORT EXCEL ================= */
function exportExcel(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Productos");
    XLSX.writeFile(wb,"inventario.xlsx");
  });
}

/* ================= EXPORT PDF ================= */
function exportPDF(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let rows = data.map(p=>[p.id,p.nombre,p.precio,p.stock]);

    doc.text("Inventario",10,10);

    doc.autoTable({
      head:[["ID","Nombre","Precio","Stock"]],
      body:rows,
      startY:20
    });

    doc.save("inventario.pdf");
  });
}

listar();

</script>

</body>
</html>
