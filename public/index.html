<!DOCTYPE html>
<html>
<head>
  <title>Inventario Pro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- LIBRERÍAS EXPORTACIÓN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    body{background:#f4f6f9;}
    .card{border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.1);}
    th{background:#4e73df;color:white;text-align:center;}
    td{text-align:center;vertical-align:middle;}
  </style>
</head>

<body class="container mt-4">

<h2 class="text-center">📦 Inventario de Productos</h2>

<!-- BUSCADOR -->
<input id="buscar" class="form-control mt-3 mb-3" placeholder="🔍 Buscar producto..." onkeyup="listar()">

<!-- BOTONES EXPORTAR -->
<div class="mb-3 text-end">
  <button class="btn btn-success" onclick="exportExcel()">📊 Excel</button>
  <button class="btn btn-danger" onclick="exportPDF()">📄 PDF</button>
</div>

<!-- FORM -->
<div class="card p-3 mt-3">
  <input id="nombre" class="form-control mb-2" placeholder="Nombre">
  <input id="precio" type="number" class="form-control mb-2" placeholder="Precio">
  <input id="stock" type="number" class="form-control mb-2" placeholder="Stock">

  <button class="btn btn-primary" onclick="guardar()">Agregar</button>
  <button class="btn btn-success mt-2" id="btnUpdate" style="display:none;" onclick="actualizar()">Actualizar</button>
</div>

<!-- TABLE -->
<div class="card p-3 mt-4">
<table class="table table-bordered">
  <thead>
    <tr>
      <th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>
</div>

<script>
const API = "http://localhost:3000/api/productos";

let editId = null;
let productosCache = [];

// LISTAR
function listar(){
  fetch(API)
    .then(r=>r.json())
    .then(data=>{

      productosCache = data;

      let filtro = document.getElementById("buscar").value.toLowerCase();
      let tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data
      .filter(p => p.nombre.toLowerCase().includes(filtro))
      .forEach(p=>{
        tabla.innerHTML += `
          <tr>
            <td>${p.id}</td>
            <td>${p.nombre}</td>
            <td>${p.precio}</td>
            <td>${p.stock}</td>
            <td>
              <button class="btn btn-warning btn-sm" onclick="editar(${p.id},'${p.nombre}',${p.precio},${p.stock})">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
            </td>
          </tr>
        `;
      });
    });
}

// GUARDAR
function guardar(){
  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:nombre.value,
      precio:parseFloat(precio.value),
      stock:parseInt(stock.value)
    })
  }).then(()=>{
    limpiar();
    listar();
  });
}

// EDITAR
function editar(id, nom, pre, sto){
  editId = id;
  nombre.value = nom;
  precio.value = pre;
  stock.value = sto;
  document.getElementById("btnUpdate").style.display = "block";
}

// ACTUALIZAR
function actualizar(){
  fetch(API+"/"+editId,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:nombre.value,
      precio:parseFloat(precio.value),
      stock:parseInt(stock.value)
    })
  }).then(()=>{
    limpiar();
    listar();
    document.getElementById("btnUpdate").style.display = "none";
    editId = null;
  });
}

// ELIMINAR
function eliminar(id){
  fetch(API+"/"+id,{method:"DELETE"})
  .then(()=>listar());
}

// LIMPIAR
function limpiar(){
  nombre.value="";
  precio.value="";
  stock.value="";
}

/* =========================
   📊 EXPORTAR EXCEL
========================= */
function exportExcel(){
  let ws = XLSX.utils.json_to_sheet(productosCache);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Productos");
  XLSX.writeFile(wb, "inventario.xlsx");
}

/* =========================
   📄 EXPORTAR PDF
========================= */
function exportPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Inventario de Productos", 14, 10);

  let rows = productosCache.map(p=>[
    p.id, p.nombre, p.precio, p.stock
  ]);

  doc.autoTable({
    head: [["ID","Nombre","Precio","Stock"]],
    body: rows,
    startY: 20
  });

  doc.save("inventario.pdf");
}

listar();
</script>

</body>
</html>
